name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 한국 오전 07:00
    - cron: '0 9 * * *'   # 한국 오후 18:00
  workflow_dispatch:      # 수동 실행 버튼

# 실행 환경 전체에 최신 Node.js 환경 강제 적용
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # v4로 확실히 고정
        uses: actions/checkout@v4

      - name: Set up Python
        # v5로 확실히 고정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 파이썬 버전도 최신 안정화 버전으로 업그레이드
          cache: 'pip'          # 라이브러리 캐싱으로 실행 속도 향상

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        run: python news_bot.py
