name: Daily News Bot

on:
  schedule:
    # 1. 한국 오전 08:00 도착 목표 (지연 없을 시 06:13 실행)
    # KST 06:13 실행 -> UTC 21:13 (전날)
    - cron: '13 21 * * *'
    
    # 2. 한국 오후 18:00 도착 목표 (지연 없을 시 15:47 실행)
    # KST 15:47 실행 -> UTC 06:47
    - cron: '47 6 * * *'
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        run: python news_bot.py

      - name: Commit and Push last_news.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f last_news.txt ]; then
            git add last_news.txt
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update news history"
              git push origin main
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
