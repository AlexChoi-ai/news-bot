name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 한국 오전 07:00 (UTC 22:00)
    - cron: '0 9 * * *'   # 한국 오후 18:00 (UTC 09:00)
  workflow_dispatch:      # 수동 실행 버튼

# 시스템 전체에 Node.js 24 사용 강제 선언
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Node.js 24를 지원하는 최신 v4 버전 사용
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        # Node.js 24를 지원하는 최신 v5 버전 사용
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        run: python news_bot.py
