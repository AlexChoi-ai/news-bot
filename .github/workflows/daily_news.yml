name: Daily News Bot

on:
  schedule:
    # 정각보다는 5~10분 정도 오프셋을 주는 것이 실행 확률이 더 높습니다.
    - cron: '5 21 * * *'  # 한국 오전 07:05 (UTC 22:05)
    - cron: '10 8 * * *'  # 한국 오후 18:10 (UTC 09:10)
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리를 모두 가져와 Push 충돌 방지

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        run: python news_bot.py

      - name: Commit and Push last_news.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f last_news.txt ]; then
            git add last_news.txt
            # [skip ci]는 유지하되, 강제로 main 브랜치에 푸시하도록 명시
            git commit -m "Update news history [skip ci]" || echo "No changes"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
