name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 한국 오전 07:00
    - cron: '0 9 * * *'   # 한국 오후 18:00
  workflow_dispatch:      # 수동 실행 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          # 이 아래 두 줄이 있어야 채널 아이디가 파이썬 코드로 전달됩니다!
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        run: python news_bot.py
