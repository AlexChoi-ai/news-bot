name: Daily News Bot

on:
  schedule:
    # GitHub Actions의 Cron은 UTC 기준입니다. (KST = UTC + 9)
    # 1. 한국 오전 06:40 실행 (UTC 21:40 - 전날)
    - cron: '40 21 * * *'
    # 2. 한국 오후 17:40 실행 (UTC 08:40)
    - cron: '40 8 * * *'
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리를 가져와 Push 충돌 방지

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil

      - name: Run news bot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_LIST: ${{ secrets.CHAT_ID_LIST }}
        # 이전 파이썬 파일명이 main.py였다면 파일명을 맞춰주세요.
        run: python news_bot.py

      - name: Commit and Push last_news.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일이 변경되었는지 확인 후 커밋 (변경사항이 없으면 스킵)
          if [ -f last_news.txt ]; then
            git add last_news.txt
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update news history [skip ci]"
              git push origin main
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
